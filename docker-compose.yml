version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: construction_journal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: always

volumes:
  postgres_data:
  uploads:
